<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Admin - Reviews & Messages</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;max-width:1000px;margin:20px}
    .row{display:flex;gap:20px}
    .col{flex:1}
    button{margin-left:8px}
    .item{border:1px solid #ddd;padding:8px;margin-bottom:8px}
    .hidden{opacity:0.5}
    pre{white-space:pre-wrap}
  </style>
</head>
<body>
  <h1>Admin</h1>
  <p id="notice"></p>
  <div class="row">
    <div class="col">
      <h2>Reviews</h2>
      <div id="reviews"></div>
    </div>
    <div class="col">
      <h2>Messages</h2>
      <div id="messages"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search)
    const key = params.get('key')
    const notice = document.getElementById('notice')
    if (!key) {
      notice.textContent = 'Missing ?key=YOURKEY in URL' 
      notice.style.color = 'red'
    }

    async function api(path, opts) {
      const url = path + (path.includes('?') ? '&' : '?') + 'key=' + encodeURIComponent(key)
      const res = await fetch(url, opts)
      if (!res.ok) throw new Error(await res.text())
      return res.json()
    }

    function el(tag, text){ const e = document.createElement(tag); if(text) e.textContent=text; return e }

    async function loadReviews(){
      try{
        const list = await api('/admin/api/reviews')
        const out = document.getElementById('reviews')
        out.innerHTML = ''
        list.forEach(r=>{
          const div = document.createElement('div')
          div.className = 'item' + (r.hidden ? ' hidden' : '')
          div.appendChild(el('strong', r.name + ' (' + r.rating + ')'))
          div.appendChild(el('div', new Date(r.createdAt).toLocaleString()))
          if(r.image){ const img = document.createElement('img'); img.src = r.image; img.style.maxWidth='100%'; div.appendChild(img) }
          div.appendChild(el('p', r.text))
          const del = document.createElement('button'); del.textContent='Delete'; del.onclick = async ()=>{ if(confirm('Delete review?')){ await api('/admin/api/reviews/'+r.id, { method:'DELETE' }); loadReviews() }}
          const hide = document.createElement('button'); hide.textContent = r.hidden ? 'Unhide' : 'Hide'; hide.onclick = async ()=>{ await api('/admin/api/reviews/'+r.id+'/hide', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ hidden: !r.hidden })}); loadReviews() }
          div.appendChild(del); div.appendChild(hide)
          out.appendChild(div)
        })
      }catch(e){ console.error(e); notice.textContent = 'Error loading reviews'; notice.style.color='red' }
    }

    async function loadMessages(){
      try{
        const list = await api('/admin/api/messages')
        const out = document.getElementById('messages')
        out.innerHTML = ''
        list.forEach(m=>{
          const div = document.createElement('div')
          div.className = 'item'
          div.appendChild(el('strong', m.name + ' — ' + m.email))
          div.appendChild(el('div', new Date(m.createdAt).toLocaleString()))
          const pre = document.createElement('pre'); pre.textContent = m.message; div.appendChild(pre)
          const del = document.createElement('button'); del.textContent='Delete'; del.onclick = async ()=>{ if(confirm('Delete message?')){ await api('/admin/api/messages/'+m.id, { method:'DELETE' }); loadMessages() }}
          div.appendChild(del)
          out.appendChild(div)
        })
      }catch(e){ console.error(e); notice.textContent = 'Error loading messages'; notice.style.color='red' }
    }

    loadReviews(); loadMessages();
  </script>
</body>
</html>
